# Render.com static-site blueprint for the checkers web app.
# Deploy by connecting this repo on https://render.com (Blueprints), or run
# `render blueprint launch` with the Render CLI. See DEPLOYMENT.md for details.
services:
  - type: web
    name: extensible-checkers
    runtime: static
    buildCommand: npm ci && npm run build:web
    staticPublishPath: ./dist/web
    pullRequestPreviewsEnabled: true
    routes:
      # Single-page app: serve index.html for any unknown path.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
